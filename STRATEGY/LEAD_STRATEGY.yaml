# ============================================================================
# LEAD SCORING & QUALIFICATION
# ============================================================================

lead_scoring:
  model_version: "1.0.0"
  
  scoring_factors:
    - factor: "market_strategy_score"
      weight: 0.30
      description: "Market's score for the relevant strategy"
    
    - factor: "contact_quality"
      weight: 0.25
      description: "Data completeness, verified phone/email"
    
    - factor: "motivation_indicators"
      weight: 0.20
      description: "Probate, foreclosure, code violation, divorce, etc."
    
    - factor: "property_fit"
      weight: 0.15
      description: "Matches deal criteria (price, condition, type)"
    
    - factor: "response_likelihood"
      weight: 0.10
      description: "Channel response rate, prior engagement"
  
  qualification_tiers:
    hot:
      score_range: [0.80, 1.00]
      action: "Call within 1 hour, priority follow-up"
      expected_conversion: 0.25
    
    warm:
      score_range: [0.60, 0.79]
      action: "Call within 24 hours, standard follow-up"
      expected_conversion: 0.12
    
    cold:
      score_range: [0.40, 0.59]
      action: "Email/SMS drip campaign, call in 3-5 days"
      expected_conversion: 0.05
    
    disqualified:
      score_range: [0.00, 0.39]
      action: "Archive, no follow-up"
      expected_conversion: 0.01

# ============================================================================
# BUDGET & ROI TRACKING
# ============================================================================

budget:
  total_monthly_budget: 8000
  
  allocation_by_strategy:
    buy_and_hold: 3500  # 43.75%
    fix_and_flip: 2800  # 35.00%
    owner_occupant: 1700  # 21.25%
  
  roi_targets:
    cost_per_lead: 4.00
    cost_per_appointment: 80.00
    cost_per_contract: 800.00
    
    expected_monthly_contracts: 10
    expected_monthly_revenue: 150000
    expected_roi: 18.75  # 18.75x return

# ============================================================================
# AUTOMATION & WORKFLOWS
# ============================================================================

automation:
  triggers:
    - event: "new_lead_added"
      action: "calculate_lead_score"
      next: "assign_to_tier"
    
    - event: "lead_tier_assigned"
      condition: "tier == 'hot'"
      action: "send_sms_alert_to_agent"
      next: "create_task_call_within_1hr"
    
    - event: "lead_tier_assigned"
      condition: "tier == 'warm'"
      action: "add_to_call_queue"
      next: "schedule_follow_up_24hr"
    
    - event: "lead_tier_assigned"
      condition: "tier == 'cold'"
      action: "add_to_drip_campaign"
      next: "schedule_call_5_days"
    
    - event: "appointment_set"
      action: "send_calendar_invite"
      next: "prepare_market_packet"
    
    - event: "appointment_completed"
      action: "log_outcome"
      next: "update_conversion_metrics"

# ============================================================================
# COMPLIANCE & ETHICS
# ============================================================================

compliance:
  do_not_call_registry: true
  can_spam_compliance: true
  tcpa_compliance: true
  fair_housing_training: required
  
  prohibited_practices:
    - "Calling before 8am or after 9pm local time"
    - "Misrepresenting property value or market conditions"
    - "Discriminatory targeting based on protected classes"
    - "Sending unsolicited faxes"
    - "Using robocalls without prior consent"
  
  required_disclosures:
    - "Licensed real estate agent disclosure"
    - "Opt-out instructions in all marketing"
    - "Fair Housing Equal Opportunity statement"

# ============================================================================
# MONITORING & ALERTS
# ============================================================================

monitoring:
  kpi_dashboard_refresh: "daily"
  
  alert_conditions:
    - metric: "cost_per_lead"
      threshold: "> $6.00"
      action: "Pause underperforming channels, review targeting"
    
    - metric: "lead_to_appointment_conversion"
      threshold: "< 5%"
      action: "Review scripts, improve qualification"
    
    - metric: "appointment_to_contract_conversion"
      threshold: "< 15%"
      action: "Improve value prop, adjust pricing strategy"
    
    - metric: "market_strategy_score_change"
      threshold: "> 0.10 decrease"
      action: "Re-evaluate geo priorities, shift budget"

# ============================================================================
# END OF LEAD_STRATEGY.yaml
# ============================================================================
