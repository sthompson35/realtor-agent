# ============================================================================
# LISTING PRESENTATION FRAMEWORK
# ============================================================================

listing_presentation:
  core_components:
    - section: "Market Analysis"
      content:
        - "Comparative Market Analysis (CMA)"
        - "Market trends (price, inventory, DOM)"
        - "Strategy-specific insights (yield, discount, appreciation)"
        - "Context flags (landlord-friendly, school ratings, etc.)"
    
    - section: "Pricing Strategy"
      content:
        - "Recommended list price with justification"
        - "Price positioning vs. competition"
        - "Expected time on market"
        - "Price adjustment strategy if needed"
    
    - section: "Marketing Plan"
      content:
        - "Professional photography + video"
        - "Virtual tours + 3D walkthrough"
        - "MLS syndication (Zillow, Realtor.com, etc.)"
        - "Social media advertising"
        - "Email blast to buyer database"
        - "Open houses + broker tours"
    
    - section: "Value Proposition"
      content:
        - "Strategy-specific buyer network"
        - "Fast close capability (if applicable)"
        - "Professional staging consultation"
        - "Transaction coordination + support"
    
    - section: "Agent Track Record"
      content:
        - "Recent sales in market"
        - "Average days on market vs. market average"
        - "List-to-sale price ratio"
        - "Client testimonials"
  
  customization_by_strategy:
    buy_and_hold:
      emphasis:
        - "Investor buyer pool"
        - "Rental yield analysis"
        - "Cash close capability"
        - "Tenant-in-place sales"
    
    fix_and_flip:
      emphasis:
        - "Cash buyer network"
        - "ARV analysis"
        - "Fast close (7-14 days)"
        - "No repair contingencies"
    
    owner_occupant:
      emphasis:
        - "Professional marketing"
        - "Buyer relocation services"
        - "Neighborhood expertise"
        - "Staging consultation"

# ============================================================================
# COMMISSION STRUCTURE
# ============================================================================

commission_structure:
  standard_rates:
    buy_and_hold: 0.06
    fix_and_flip: 0.05
    owner_occupant: 0.06
  
  volume_incentives:
    - tier: "5+ listings per year"
      discount: 0.005
    - tier: "10+ listings per year"
      discount: 0.01
  
  referral_fees:
    incoming: 0.25  # 25% of commission
    outgoing: 0.25  # 25% of commission

# ============================================================================
# LISTING LIFECYCLE MANAGEMENT
# ============================================================================

listing_lifecycle:
  stages:
    - stage: "Pre-Listing"
      duration_days: 7
      activities:
        - "Initial consultation"
        - "Property walkthrough"
        - "CMA preparation"
        - "Listing presentation"
        - "Sign listing agreement"
    
    - stage: "Preparation"
      duration_days: 14
      activities:
        - "Professional photos + video"
        - "Virtual tour creation"
        - "Staging consultation"
        - "Repairs/improvements (if needed)"
        - "MLS data entry"
    
    - stage: "Active Marketing"
      duration_days: 30
      activities:
        - "MLS activation"
        - "Social media campaigns"
        - "Email blasts"
        - "Open houses"
        - "Broker tours"
        - "Showing coordination"
    
    - stage: "Under Contract"
      duration_days: 30
      activities:
        - "Negotiate offer"
        - "Inspection coordination"
        - "Appraisal coordination"
        - "Repair negotiations"
        - "Closing preparation"
    
    - stage: "Closed"
      duration_days: 1
      activities:
        - "Final walkthrough"
        - "Closing attendance"
        - "Commission disbursement"
        - "Post-close follow-up"
  
  performance_metrics:
    - metric: "Average Days on Market"
      target: "< market average"
    
    - metric: "List-to-Sale Price Ratio"
      target: "> 97%"
    
    - metric: "Close Rate"
      target: "> 90%"
    
    - metric: "Client Satisfaction"
      target: "> 4.5/5.0"

# ============================================================================
# COMPETITIVE POSITIONING
# ============================================================================

competitive_positioning:
  unique_selling_propositions:
    - "Strategy-specific expertise (buy & hold, fix & flip, owner occupant)"
    - "Data-driven market analysis (US_BEST_MARKETS_REPORT)"
    - "Pre-qualified buyer networks"
    - "Fast close capability (7-14 days for investors)"
    - "Professional marketing (photos, video, virtual tours)"
    - "Transaction coordination + support"
  
  target_competitors:
    - type: "Traditional agents"
      weakness: "Lack investor buyer network"
      our_advantage: "Cash buyer pool + fast close"
    
    - type: "Discount brokers"
      weakness: "Limited marketing + support"
      our_advantage: "Full-service marketing + transaction coordination"
    
    - type: "iBuyers (Opendoor, Offerpad)"
      weakness: "Low offers (typically 70-80% of market value)"
      our_advantage: "Market-rate pricing + competitive bidding"

# ============================================================================
# AUTOMATION & WORKFLOWS
# ============================================================================

automation:
  triggers:
    - event: "listing_signed"
      action: "create_listing_checklist"
      next: "schedule_photo_shoot"
    
    - event: "photos_uploaded"
      action: "create_virtual_tour"
      next: "prepare_mls_entry"
    
    - event: "mls_activated"
      action: "send_email_blast"
      next: "schedule_open_house"
    
    - event: "offer_received"
      action: "notify_seller"
      next: "prepare_counter_offer"
    
    - event: "contract_signed"
      action: "create_transaction_timeline"
      next: "coordinate_inspection"
    
    - event: "closing_scheduled"
      action: "send_closing_checklist"
      next: "prepare_final_walkthrough"

# ============================================================================
# MONITORING & ALERTS
# ============================================================================

monitoring:
  kpi_dashboard_refresh: "daily"
  
  alert_conditions:
    - metric: "days_on_market"
      threshold: "> 45 days"
      action: "Review pricing, adjust marketing strategy"
    
    - metric: "showing_count"
      threshold: "< 2 per week"
      action: "Increase marketing, consider price adjustment"
    
    - metric: "list_to_sale_ratio"
      threshold: "< 95%"
      action: "Review pricing strategy, improve negotiation"
    
    - metric: "close_rate"
      threshold: "< 85%"
      action: "Improve buyer qualification, address inspection issues"

# ============================================================================
# END OF LISTING_STRATEGY.yaml
# ============================================================================
