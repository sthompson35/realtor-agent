# Security Configuration for Realtor Agent
# Production security settings and compliance requirements

# Encryption Settings
encryption:
  algorithm: AES-256-GCM
  key_rotation_days: 90
  backup_encryption: true

# API Security
api_security:
  rate_limiting:
    enabled: true
    requests_per_minute: 1000
    burst_limit: 2000
  authentication:
    jwt_expiration: 1800  # 30 minutes
    refresh_token_expiration: 604800  # 7 days
    password_policy:
      min_length: 16
      require_uppercase: true
      require_lowercase: true
      require_numbers: true
      require_special_chars: true
  cors:
    allowed_origins: ["https://app.realtoragent.com"]
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["Content-Type", "Authorization", "X-API-Key"]
    max_age: 86400

# Database Security
database_security:
  ssl_required: true
  ssl_verify: full
  connection_pool_size: 20
  connection_timeout: 30
  audit_logging: true
  data_masking:
    enabled: true
    mask_fields: ["phone", "email", "ssn", "bank_account"]

# File Security
file_security:
  upload_validation:
    max_file_size: 10485760  # 10MB
    allowed_extensions: [".pdf", ".doc", ".docx", ".jpg", ".png"]
    virus_scanning: true
  storage_encryption: true
  access_control: true

# Network Security
network_security:
  firewall_rules:
    - allow: "80"    # HTTP
    - allow: "443"   # HTTPS
    - allow: "5432"  # PostgreSQL (internal only)
    - allow: "6379"  # Redis (internal only)
  ip_whitelist: []  # Add specific IPs for admin access
  ddos_protection: true

# Compliance Settings
compliance:
  gdpr:
    enabled: true
    data_retention_years: 7
    consent_management: true
    right_to_be_forgotten: true
  ccpa:
    enabled: true
    data_sales_opt_out: true
    data_deletion: true
  fair_housing:
    audit_trail: true
    protected_class_detection: true
  anti_spam:
    tcpacan_compliance: true
    can_spam_compliance: true
    dnc_integration: true

# Audit Logging
audit_logging:
  enabled: true
  log_level: "INFO"
  retention_days: 2555  # 7 years
  sensitive_data_masking: true
  events_to_log:
    - user_login
    - user_logout
    - data_access
    - data_modification
    - api_calls
    - compliance_violations
    - security_events

# Incident Response
incident_response:
  alert_emails: ["security@realtoragent.com", "emergency@realtoragent.com"]
  alert_phone: "+1-555-0123"
  escalation_procedure: |
    1. Security team notified immediately
    2. Isolate affected systems
    3. Assess breach scope
    4. Notify affected parties (if required)
    5. Restore from clean backups
    6. Post-incident review and improvements

# Backup Security
backup_security:
  encryption_at_rest: true
  secure_transfer: true
  offsite_storage: true
  backup_retention:
    daily: 30
    weekly: 12
    monthly: 36
    yearly: 7
  test_restoration: monthly

# Third-party Security
third_party_security:
  vendor_assessment_required: true
  security_questionnaire: true
  contract_clauses:
    - data_protection
    - incident_notification
    - audit_rights
    - insurance_requirements

# Development Security
development_security:
  secrets_management: true
  code_scanning: true
  dependency_scanning: true
  security_testing: true
  pre_commit_hooks: true