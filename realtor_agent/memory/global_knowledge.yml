# Global Knowledge Base
# This file stores shared knowledge, formulas, and rules used across the system.

# Core Formulas
core_formulas:
  mao_flip:
    description: "Maximum Allowable Offer (flip)"
    formula: "MAO = (ARV * (1 - profit_margin)) - rehab - holding - closing"
    defaults:
      profit_margin: 0.20
      holding_months: 6
      closing_percent: 0.03
  mao_rental:
    description: "MAO for rentals (rule-of-thumb + DSCR check)"
    steps:
      - "Estimate NOI = (rent_monthly * 12) - vacancy - taxes - insurance - maintenance - management"
      - "Check DSCR = NOI / annual_debt_service"
      - "Back into price that meets DSCR 1.25+ and target cap/CoC 8%+"
    defaults:
      vacancy_rate: 0.05
      maintenance_rate: 0.01
      management_rate: 0.08
      dscr_target: 1.25
      coc_target: 0.08
  land_pricing:
    description: "Land: comps-driven + utilities/zoning constraints"
    notes:
      - "Frontage, access, perc test, wetlands, easements, topo drive value"
      - "Adjust comps by 20-50% for utility access issues"
      - "Zoning changes can add 2-5x value"

