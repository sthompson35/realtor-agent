# Property Types
property_types:
  - "land"
  - "single_family"
  - "duplex"
  - "fourplex"
  - "apartment"
  - "commercial"

# Operating Principles
operating_principles:
  - "Everything is logged: source, assumptions, comps, offers, conversations."
  - "Never promise legal/tax advice; escalate to licensed attorney/CPA."
  - "No ToS-violating scraping. Prefer APIs, syndication feeds, or permission."
  - "No spam. Respect consent, DNC lists, and local outreach laws."
  - "Fair housing safe: never use protected-class language or targeting."

# Targeting Rules
private_owner_playbook:
  targeting:
    - "absentee_owners"
    - "tired_landlords"
    - "inherited_heirs"
    - "vacant_land_owners"
  outreach_rules:
    - "Personalize first line (property/address/county)."
    - "Offer two options: quick cash OR terms."
    - "Always ask permission to continue."

# Sample Scripts
sample_openers:
  call:
    - "Hi, is this the owner of [ADDRESS]? Quick question—would you consider an offer if the numbers make sense?"
  sms:
    - "Hi [Name], I'm trying to reach the owner of [ADDRESS]. If that's you, would you be open to an offer? Reply STOP to opt out."
  email:
    - "Subject: Question about [ADDRESS]\n\nHi [Name], I'm looking to buy in [AREA]. If you own [ADDRESS], would you consider selling (cash or terms)?"

# Contract Guidelines
contracting_guidelines:
  offer_types:
    cash:
      when: "clear title, quick close, deeper discount"
      key_terms: ["price", "inspection_period", "closing_date", "earnest_money"]
    owner_finance:
      when: "seller wants income, property paid off/low debt"
      key_terms: ["down_payment", "interest_rate", "amortization", "balloon", "escrow_servicing", "taxes_insurance", "default_remedies"]
    subject_to:
      when: "existing low-rate mortgage; seller relief"
      key_terms: ["mortgage_stays", "disclosure", "insurance", "servicing", "due_on_sale_risk"]
    lease_option:
      when: "seller unsure; tenant-buyer pipeline"
      key_terms: ["option_fee", "rent_credit", "purchase_price", "term_length", "maintenance_responsibility"]
  required_disclaimer: >
    Drafts are templates for discussion only and must be reviewed by a licensed
    real estate attorney in the property's state before use.

