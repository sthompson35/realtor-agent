meta:
  name: "Realtor_Agent Knowledge Pack"
  version: "1.0.0"
  owner: "Shylow Thompson LLC"
  scope:
    - land
    - single_family
    - duplex
    - fourplex
    - apartments
    - commercial
  mission: >
    Find, underwrite, and acquire properties from private owners using ethical,
    compliant outreach and investor-grade analysis. Optimize for speed + safety.

operating_principles:
  - "Everything is logged: source, assumptions, comps, offers, conversations."
  - "Never promise legal/tax advice; escalate to licensed attorney/CPA."
  - "No ToS-violating scraping. Prefer APIs, syndication feeds, or permission."
  - "No spam. Respect consent, DNC lists, and local outreach laws."
  - "Fair housing safe: never use protected-class language or targeting."

persona:
  voice:
    tone: ["calm", "direct", "professional", "solution-focused"]
    style_rules:
      - "Short sentences. Clear next steps."
      - "Numbers over vibes."
      - "If uncertain, say what's missing and how to get it."
  identity:
    role: "Acquisitions operator + analyst"
    priorities: ["deal quality", "risk control", "speed", "documentation"]

capabilities_matrix:
  realtor_agent:
    - orchestrate_workflows
    - decision_gates
    - summarize_tradeoffs
    - approve_or_request_more_data
  bots:
    web_scout:
      can:
        - "collect listing metadata (address/city/price/acreage/beds/baths)"
        - "capture photos/notes only if permitted"
        - "store URL + timestamp + source"
      cannot:
        - "bypass paywalls/captchas"
        - "violate robots.txt or site ToS"
    underwriter:
      can:
        - "MAO calculations"
        - "rent estimates inputs + DSCR quick check"
        - "rehab tiering (light/medium/heavy) with ranges"
        - "exit strategy recommendation"
      outputs:
        - "one-page underwriting summary"
        - "risk flags list"
    deal_desk:
      can:
        - "draft term sheets and offer letters"
        - "assemble contract checklists (OF/subject-to/lease-option)"
        - "generate addenda placeholders"
      must_include:
        - "ATTORNEY_REVIEW_REQUIRED: true"
    outreach:
      can:
        - "create owner scripts (SMS/call/email/mail)"
        - "follow-up cadence plan"
        - "objection handling library"
      must_check:
        - "consent/DNC/compliance before message"

data_schema:
  property:
    fields:
      - address
      - city
      - state
      - zip
      - county
      - parcel_apn
      - property_type
      - beds
      - baths
      - sqft
      - lot_size
      - year_built
      - utilities
      - zoning
      - flood_zone
      - asking_price
      - source_url
      - source_site
      - notes
  owner:
    fields:
      - owner_name
      - mailing_address
      - ownership_type
      - phone
      - email
      - contact_source
      - contact_permissions
  underwriting:
    fields:
      - arv
      - rent_monthly
      - rehab_estimate
      - holding_costs
      - closing_costs
      - offer_type
      - mao
      - exit_strategy
      - risk_flags

core_formulas:
  mao_flip:
    description: "Maximum Allowable Offer (flip)"
    formula: "MAO = (ARV * (1 - profit_margin)) - rehab - holding - closing"
    defaults:
      profit_margin: 0.20
  mao_rental:
    description: "MAO for rentals (rule-of-thumb + DSCR check)"
    steps:
      - "Estimate NOI = rent*12 - vacancy - taxes - insurance - maintenance - management"
      - "Check DSCR using expected debt service"
      - "Back into price that meets DSCR + target cap/CoC"
  land_pricing:
    description: "Land: comps-driven + utilities/zoning constraints"
    notes:
      - "Frontage, access, perc test, wetlands, easements, topo drive value."

risk_flags_library:
  title_issues:
    - "unknown_liens"
    - "tax_delinquency"
    - "clouded_title"
    - "heirs"
  physical:
    - "foundation_failure"
    - "roof_end_of_life"
    - "mold_water_intrusion"
  land_specific:
    - "no_legal_access"
    - "failed_perc_test"
    - "floodway_wetlands"
    - "zoning_mismatch"
  deal_structure:
    - "balloon_too_short"
    - "rate_above_market"
    - "unclear_insurance"

private_owner_playbook:
  targeting:
    - "absentee_owners"
    - "tired_landlords"
    - "inherited_heirs"
    - "vacant_land_owners"
  outreach_rules:
    - "Personalize first line (property/address/county)."
    - "Offer two options: quick cash OR terms."
    - "Always ask permission to continue."
  sample_openers:
    call:
      - "Hi, is this the owner of [ADDRESS]? Quick question—would you consider an offer if the numbers make sense?"
    sms:
      - "Hi [Name], I'm trying to reach the owner of [ADDRESS]. If that's you, would you be open to an offer? Reply STOP to opt out."
    email:
      - "Subject: Question about [ADDRESS]\n\nHi [Name], I'm looking to buy in [AREA]. If you own [ADDRESS], would you consider selling (cash or terms)?"

contracting_guidelines:
  offer_types:
    cash:
      when: "clear title, quick close, deeper discount"
      key_terms: ["price", "inspection_period", "closing_date", "earnest_money"]
    owner_finance:
      when: "seller wants income, property paid off/low debt"
      key_terms: ["down_payment", "interest_rate", "amortization", "balloon", "escrow_servicing", "taxes_insurance", "default_remedies"]
    subject_to:
      when: "existing low-rate mortgage; seller relief"
      key_terms: ["mortgage_stays", "disclosure", "insurance", "servicing", "due_on_sale_risk"]
    lease_option:
      when: "seller unsure; tenant-buyer pipeline"
      key_terms: ["option_fee", "rent_credit", "purchase_price", "term_length", "maintenance_responsibility"]
  required_disclaimer: >
    Drafts are templates for discussion only and must be reviewed by a licensed
    real estate attorney in the property's state before use.

tools_and_sources:
  listing_sources:
    - "zillow"
    - "realtor"
    - "homes"
    - "land"
    - "discountlots"
  preferred_methods:
    - "official_APIs"
    - "IDX_feeds"
    - "data_vendors"
    - "public_records"
