# Database-Excel Synchronization Configuration
# This file contains settings for synchronizing data between database and Excel files

[sync]
# Default synchronization settings
default_direction = "bidirectional"
default_conflict_resolution = "newest_wins"
batch_size = 100
dry_run_by_default = false

# Database settings
database_url = "sqlite:///realtor_agent.db"

# Excel file settings
excel_file = "Land_and_Build_Flipping_System_v2.xlsx"
leads_sheet = "09_Leads_CRM"

# Field mappings for leads
[leads_mapping]
lead_id = "Lead ID"
name = "Owner Name"
email = "Email"
phone = "Phone"
source = "Source (List)"
status = "Status"
notes = "Last Contact"

# Scheduled sync settings (for future use)
[schedule]
enabled = false
interval_hours = 24
auto_resolve_conflicts = true
notify_on_conflicts = true

# Logging settings
[logging]
level = "INFO"
log_file = "logs/sync.log"
max_log_size = 10485760  # 10MB
backup_count = 5